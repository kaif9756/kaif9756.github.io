<!DOCTYPE html>
<html>
<head>
    <title>Mohd Kaif | Cybersecurity Portfolio</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <script src="https://kit.fontawesome.com/yourkitid.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Share Tech Mono', monospace;
            background: black;
            color: #00ffcc;
            text-align: center;
        }

        .background {
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b') no-repeat center center/cover;
            position: fixed;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            z-index: -1;
        }

        .container {
            padding: 50px 20px;
        }

        img {
            width: 150px;
            border-radius: 50%;
            border: 3px solid #00ffcc;
        }

        h1 {
            font-size: 40px;
            margin: 10px 0;
        }

        .typing {
            font-size: 20px;
            height: 30px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background: #00ffcc;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn:hover {
            background: white;
            color: black;
        }

        .section {
            margin-top: 40px;
        }

        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            background: black;
            border: 1px solid #00ffcc;
            color: #00ffcc;
        }

        input[type="submit"] {
            background: #00ffcc;
            color: black;
            cursor: pointer;
            font-weight: bold;
        }

        .icons a {
            color: #00ffcc;
            font-size: 30px;
            margin: 10px;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="background"></div>

<div class="container">

    <img src="profile.jpg" alt="Kaif Malik">

    <h1>Mohd Kaif</h1>

    <div class="typing" id="typing"></div>

    <a href="Kaif_Malik_Resume.pdf" class="btn" target="_blank">Download Resume</a>

    <div class="section">
        <h2>Skills</h2>
        <p>Python | Network Security | Wireshark | Nmap | Linux | IDS</p>
    </div>

    <div class="section">
        <h2>Featured Project</h2>
        <p>Brute Force Attack Detection Model</p>
    </div>

    <div class="section icons">
        <h2>Connect With Me</h2>
        <a href="https://linkedin.com/in/yourlinkedin" target="_blank">
            <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/kaif9756" target="_blank">
            <i class="fab fa-github"></i>
        </a>
    </div>

    <div class="section">
        <h2>Contact Me</h2>

        <form action="https://formsubmit.co/yourgma@gmail.com" method="POST">
            <input type="text" name="name" placeholder="Your Name" required><br>
            <input type="email" name="email" placeholder="Your Email" required><br>
            <textarea name="message" rows="4" placeholder="Your Message" required></textarea><br>

            <input type="hidden" name="_captcha" value="false">
            <input type="submit" value="Send Message">
        </form>
    </div>

</div>

<script>
    const textArray = [
        "Cybersecurity Student",
        "Threat Detection Enthusiast",
        "Network Security Learner",
        "Building Real-World Security Projects"
    ];

    let typingElement = document.getElementById("typing");
    let index = 0;
    let charIndex = 0;
    let currentText = "";
    let isDeleting = false;
  
    function type() {
        if (index >= textArray.length) index = 0;

        currentText = textArray[index];

        if (!isDeleting) {
            typingElement.innerHTML = currentText.substring(0, charIndex++);
            if (charIndex > currentText.length) {
                isDeleting = true;
                setTimeout(type, 1000);
                return;
            }
        } else {
            typingElement.innerHTML = currentText.substring(0, charIndex--);
            if (charIndex === 0) {
                isDeleting = false;
                index++;
            }
        }

        setTimeout(type, isDeleting ? 50 : 100);
    }

    type();
</script>

</body>
</html>
